<script>
    const originalWords = ["wählen", "ehrlich", "Lehrerin", "Lehrer", "wahrscheinlich", "zahlen", "froh", "fehlen"];
    
    // Zufalls-Funktion (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    // Beim allerersten Start die Wörter direkt mischen
    let words = shuffleArray(originalWords);
    
    let currentWord = "";
    let guessedLetters = [];
    let mistakes = 0;
    const maxMistakes = 7;

    const wordDisplay = document.getElementById("word-display");
    const keyboardDiv = document.getElementById("keyboard");
    const messageDiv = document.getElementById("message");
    const nextBtn = document.getElementById("next-btn");
    const restartBtn = document.getElementById("restart-btn");
    const fullWordInput = document.getElementById("full-word-input");
    const fullWordSection = document.getElementById("full-word-section");
    const attemptsDisplay = document.getElementById("attempts-display");

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ".split("");

    const keyboardRows = [
        ["Q", "W", "E", "R", "T", "Z", "U", "I", "O", "P", "Ü"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Ö", "Ä"],
        ["Y", "X", "C", "V", "B", "N", "M"]
    ];

    fullWordInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            guessFullWord();
        }
    });

    document.addEventListener("keydown", function(event) {
        if (document.activeElement === fullWordInput) {
            return;
        }
        
        const key = event.key.toUpperCase();
        if (alphabet.includes(key)) {
            const buttons = keyboardDiv.getElementsByClassName("key");
            for (let btn of buttons) {
                if (btn.innerText === key && !btn.disabled) {
                    btn.click();
                    break;
                }
            }
        }
    });

    function initGame() {
        if (words.length === 0) {
            showVictory();
            return;
        }
        
        currentWord = words[0].toUpperCase();
        guessedLetters = [];
        mistakes = 0;
        
        messageDiv.innerText = "";
        fullWordInput.value = "";
        nextBtn.classList.add("hidden");
        fullWordSection.classList.remove("hidden");
        keyboardDiv.classList.remove("hidden");
        updateAttemptsDisplay();
        
        hideAllIslandParts();
        createKeyboard();
        updateWordDisplay();
        
        fullWordInput.focus();
    }

    function createKeyboard() {
        keyboardDiv.innerHTML = "";
        keyboardRows.forEach(row => {
            const rowDiv = document.createElement("div");
            rowDiv.className = "keyboard-row";
            row.forEach(letter => {
                const btn = document.createElement("button");
                btn.innerText = letter;
                btn.className = "key";
                btn.onclick = () => handleGuess(letter, btn);
                rowDiv.appendChild(btn);
            });
            keyboardDiv.appendChild(rowDiv);
        });
    }

    function handleGuess(letter, btn) {
        btn.disabled = true;
        guessedLetters.push(letter);

        if (currentWord.includes(letter)) {
            updateWordDisplay();
            checkWin();
        } else {
            addMistake();
        }
        
        fullWordInput.focus();
    }

    function updateWordDisplay() {
        let display = "";
        for (let char of currentWord) {
            if (guessedLetters.includes(char)) {
                display += char + " ";
            } else {
                display += "_ ";
            }
        }
        wordDisplay.innerText = display.trim();
    }

    function guessFullWord() {
        const guess = fullWordInput.value.toUpperCase().trim();
        if (!guess) return;

        if (guess === currentWord) {
            wordDisplay.innerText = currentWord.split('').join(' ');
            handleWin();
        } else {
            fullWordInput.value = "";
            messageDiv.innerText = "Oh nein, das war nicht ganz richtig!";
            messageDiv.style.color = "#d32f2f";
            addMistake();
            fullWordInput.focus();
        }
    }

    function addMistake() {
        mistakes++;
        updateAttemptsDisplay();
        showIslandPart(mistakes);
        if (mistakes >= maxMistakes) {
            gameOver();
        }
    }

    function updateAttemptsDisplay() {
        const remaining = maxMistakes - mistakes;
        if (remaining > 1) {
            attemptsDisplay.innerText = `Noch ${remaining} Versuche!`;
            attemptsDisplay.style.color = "#d84315";
        } else if (remaining === 1) {
            attemptsDisplay.innerText = "Letzter Versuch!";
            attemptsDisplay.style.color = "#c62828";
        } else {
            attemptsDisplay.innerText = "Keine Versuche mehr!";
        }
    }

    function showIslandPart(partNumber) {
        if (partNumber <= maxMistakes) {
            document.getElementById("part" + partNumber).classList.remove("hidden");
        }
    }

    function hideAllIslandParts() {
        for (let i = 1; i <= maxMistakes; i++) {
            document.getElementById("part" + i).classList.add("hidden");
        }
    }

    function checkWin() {
        let won = true;
        for (let char of currentWord) {
            if (!guessedLetters.includes(char)) {
                won = false;
                break;
            }
        }
        if (won) {
            handleWin();
        }
    }

    function handleWin() {
        messageDiv.innerText = "Super gemacht! Wort erraten! 🎉";
        messageDiv.style.color = "#2e7d32";
        disableGame();
        nextBtn.classList.remove("hidden");
        nextBtn.focus();
    }

    function gameOver() {
        messageDiv.innerText = `Schade! Das Wort war: ${words[0]}`;
        messageDiv.style.color = "#c62828";
        wordDisplay.innerText = currentWord.split('').join(' ');
        disableGame();
        nextBtn.classList.remove("hidden");
        nextBtn.focus();
    }

    function disableGame() {
        fullWordSection.classList.add("hidden");
        keyboardDiv.classList.add("hidden");
    }

    function nextWord() {
        words.shift();
        initGame();
    }

    function showVictory() {
        wordDisplay.innerText = "🏆";
        messageDiv.innerText = "Herzlichen Glückwunsch! Du hast alle Schatzwörter der Woche geschafft!";
        messageDiv.style.color = "#f57c00";
        keyboardDiv.innerHTML = "";
        fullWordSection.classList.add("hidden");
        nextBtn.classList.add("hidden");
        restartBtn.classList.remove("hidden");
        attemptsDisplay.classList.add("hidden");
        
        for(let i=1; i<=maxMistakes; i++){
            showIslandPart(i);
        }
    }

    function restartGame() {
        // Beim Neustart werden die Wörter wieder komplett neu gemischt
        words = shuffleArray(originalWords);
        restartBtn.classList.add("hidden");
        attemptsDisplay.classList.remove("hidden");
        initGame();
    }

    window.onload = initGame;
</script>
